<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkAdventure Clone - Premium Virtual Office</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src='https://8x8.vc/external_api.js'></script>
  </head>
  <body>
    <!-- App Wrapper for HUD -->
    <div id="game-container"></div>

    <div id="hud-main">
      <div id="app-wrapper">
        <header class="hud-header">
          <div class="logo">Virtual<span>Office</span></div>
          <div class="user-indicators">
            <div class="user-status guest">
              <div class="avatar-icon partner"></div>
              <span id="user-partner-name">Partner</span>
            </div>
            <div class="user-status">
              <div class="avatar-icon"></div>
              <span id="user-display-name">Carregando...</span>
            </div>
          </div>
        </header>
        
        <!-- Minecraft Style Chat -->
        <div id="chat-panel" class="minecraft-chat">
          <div class="chat-messages">
            <div class="msg system">Pressione 'T' ou 'Enter' para falar no chat.</div>
          </div>
          <div class="chat-input-area">
            <span class="chat-prefix">></span>
            <input type="text" id="chat-input" autocomplete="off" />
          </div>
        </div>
        
        <!-- Task Board Panel (Hidden by default) -->
        <div id="task-board" class="side-panel left">
          <div class="panel-header">
            <h3>Project Roadmap</h3>
            <button class="close-tasks">×</button>
          </div>
          <div class="task-list">
            <div class="task-item done">
              <span class="status">✓</span>
              <p>Setup Virtual Office Foundation</p>
            </div>
          </div>
        </div>

        <nav class="hud-footer">
          <div class="action-buttons">
            <button class="btn btn-chat" id="btn-chat">
              <span class="btn-icon">💬</span> Chat
            </button>
            <button class="btn btn-tasks" id="btn-tasks">
              <span class="btn-icon">📋</span> Roadmap
            </button>
            <button class="btn btn-jukebox" id="btn-jukebox" style="background: rgba(167, 139, 250, 0.2); border-color: rgba(167, 139, 250, 0.4); color: #c4b5fd;">
              <span class="btn-icon">📻</span> Jukebox
            </button>
            <button class="btn btn-customize" id="btn-customize">
              <span class="btn-icon">👕</span> Personalizar
            </button>
          </div>
          
          <div class="admin-group">
            <button class="btn btn-layout" id="btn-layout" style="display: none">
              <span class="btn-icon">⊞</span> Modo Layout
            </button>
            <button class="btn btn-danger" id="btn-logout" style="background: rgba(239, 68, 68, 0.2); color: #fca5a5; border-color: rgba(239, 68, 68, 0.4);">
              <span class="btn-icon">🚪</span> Sair
            </button>
          </div>
        </nav>
        </div> <!-- End of app-wrapper -->
        
        <!-- Meeting Modal (Proximity-based for Reunion Room) -->
        <div id="meeting-modal" class="meeting-overlay">
          <div class="meeting-content">
            <div class="meeting-header">
              <div class="status-badge">🔴 LIVE MEETING</div>
              <h2 id="meeting-room-name">Sala de Reunião</h2>
              <div id="meeting-participants-count">Carregando chamada...</div>
            </div>
            <div id="jitsi-container" style="flex-grow:1; border-radius:16px; overflow:hidden; background:#000; position:relative;">
              <!-- Jitsi Iframe will be injected here -->
            </div>
            <div class="meeting-footer">
              <a id="meeting-external-link" href="#" target="_blank" class="meet-btn share-btn" style="text-decoration:none; display:none;">Abrir em Nova Aba (Failsafe)</a>
              <button class="meet-btn leave-btn" id="btn-leave-meeting" style="padding: 10px 40px;">Sair da Reunião</button>
            </div>
          </div>
        </div>
      </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
